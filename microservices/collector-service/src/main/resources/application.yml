spring:
  application:
    name: collector-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/harness_db}
    username: ${DB_USERNAME:harness}
    password: ${DB_PASSWORD:harness}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # 전송 실패 시 재시도 (멱등성 활성화)
      properties:
        enable.idempotence: true
        retries: 3

server:
  port: 8081

topics:
  data-collected: harness.data.collected
