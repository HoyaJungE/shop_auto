services:

  # ══════════════════════════════════════════════════════════════════════
  # 인프라 (Infrastructure)
  # ══════════════════════════════════════════════════════════════════════

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: harness-postgres
    environment:
      POSTGRES_DB:       harness_db
      POSTGRES_USER:     harness
      POSTGRES_PASSWORD: harness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (API Gateway Rate Limit + 캐시) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: harness-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3 호환 파일 스토리지) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: harness-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # 콘솔 http://localhost:9001
    volumes:
      - minio_data:/data

  # ── Kafka + Zookeeper (③ 마이크로서비스 이벤트 버스) ───────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: harness-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: harness-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI (개발 편의) ────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: harness-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"   # http://localhost:9090
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ══════════════════════════════════════════════════════════════════════
  # 애플리케이션 서비스 (모노리스 모드)
  # 마이크로서비스로 분리 시 아래 각 서비스를 별도 컨테이너로 교체
  # ══════════════════════════════════════════════════════════════════════

  # ── 모노리스 (개발 초기 단계) ──────────────────────────────────────
  app:
    build:
      context: ./spring-boot
      dockerfile: Dockerfile
    container_name: harness-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/harness_db
      DB_USERNAME: harness
      DB_PASSWORD: harness
      KAFKA_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-must-be-at-least-256-bits-long!!}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      PLAYWRIGHT_SERVICE_URL: http://playwright-service:3100
    profiles:
      - monolith    # docker compose --profile monolith up

  # ══════════════════════════════════════════════════════════════════════
  # 마이크로서비스 모드 (--profile microservices)
  # docker compose --profile microservices up
  # ══════════════════════════════════════════════════════════════════════

  api-gateway:
    build:
      context: ./microservices/api-gateway
      dockerfile: Dockerfile
    container_name: harness-gateway
    depends_on:
      - redis
      - kafka
    ports:
      - "8080:8080"   # 외부 단일 진입점
    environment:
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-must-be-at-least-256-bits-long!!}
      SPRING_REDIS_HOST: redis
      COLLECTOR_SERVICE_URL: http://collector-service:8081
      ANALYZER_SERVICE_URL:  http://analyzer-service:8082
      CRAWLER_SERVICE_URL:   http://crawler-service:8083
    profiles:
      - microservices

  collector-service:
    build:
      context: ./microservices/collector-service
      dockerfile: Dockerfile
    container_name: harness-collector
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/harness_db
      DB_USERNAME: harness
      DB_PASSWORD: harness
      KAFKA_SERVERS: kafka:9092
    profiles:
      - microservices

  analyzer-service:
    build:
      context: ./microservices/analyzer-service
      dockerfile: Dockerfile
    container_name: harness-analyzer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/harness_db
      DB_USERNAME: harness
      DB_PASSWORD: harness
      KAFKA_SERVERS: kafka:9092
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    profiles:
      - microservices

  crawler-service:
    build:
      context: ./microservices/crawler-service
      dockerfile: Dockerfile
    container_name: harness-crawler
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/harness_db
      DB_USERNAME: harness
      DB_PASSWORD: harness
      KAFKA_SERVERS: kafka:9092
    profiles:
      - microservices

  # ── Playwright 자동화 서비스 ────────────────────────────────
  playwright-service:
    build:
      context: ./playwright-service
      dockerfile: Dockerfile
    container_name: harness-playwright
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      # true: 화면 없이 백그라운드 실행 (서버 배포 시)
      # false: 브라우저 창이 보이는 headful 모드 (로컬 디버깅 시)
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
      # 동작 간 지연(ms) — 값이 클수록 봇 감지 위험 감소, 속도 저하
      BROWSER_SLOW_MO: ${BROWSER_SLOW_MO:-300}
      # 등록 완료/실패 시 Spring Boot로 콜백 URL
      SPRING_CALLBACK_URL: http://app:8080/internal/playwright/callback
      LOG_LEVEL: info
    volumes:
      - playwright_screenshots:/app/screenshots
      - playwright_logs:/app/logs
    # headful 모드 사용 시 디스플레이 필요 (로컬 개발)
    # environment에 DISPLAY: :99 추가 후 Xvfb 실행 필요
    profiles:
      - monolith
      - microservices

volumes:
  postgres_data:
  minio_data:
  playwright_screenshots:
  playwright_logs:
