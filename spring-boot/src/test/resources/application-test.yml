spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # 테스트에서는 DDL-auto 사용
  batch:
    job:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9999  # 테스트에서 Kafka 안 씀

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256!!
  issuer: harness-test
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

playwright:
  service:
    url: http://localhost:3100

platform:
  coupang:
    login-id: test-coupang
    password: test-pass
  naver:
    login-id: test-naver
    password: test-pass
  ohouse:
    login-id: test-ohouse
    password: test-pass
