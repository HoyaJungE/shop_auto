name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── playwright-service 테스트 (Node.js) ────────────────────────────────
  playwright-service-test:
    name: playwright-service (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: playwright-service

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: playwright-service/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 실행
        run: npm test

      - name: 커버리지 수집
        run: npm run test:coverage
        continue-on-error: true

  # ── Spring Boot 테스트 (Java 21) ───────────────────────────────────────
  spring-boot-test:
    name: Spring Boot (Java 21)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spring-boot

    services:
      # H2 in-memory DB 사용 (테스트 프로필)
      # postgres, kafka 불필요

    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설정 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle wrapper 권한 설정
        run: chmod +x ./gradlew

      - name: 단위 테스트 실행
        run: ./gradlew test -Dspring.profiles.active=test
        env:
          JAVA_TOOL_OPTIONS: "-Xmx2g"

      - name: 테스트 결과 리포트
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Spring Boot Tests
          path: spring-boot/build/test-results/test/*.xml
          reporter: java-junit

  # ── 전체 통합 빌드 확인 ────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [playwright-service-test, spring-boot-test]

    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Spring Boot 빌드
        run: |
          chmod +x spring-boot/gradlew
          cd spring-boot && ./gradlew bootJar -x test

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: playwright-service 빌드
        run: |
          cd playwright-service && npm ci && npm run build
